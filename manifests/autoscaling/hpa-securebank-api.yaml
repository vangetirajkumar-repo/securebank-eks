apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: securebank-api-hpa
  namespace: securebank
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: securebank-api-blue   # or green, depending on active version
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

