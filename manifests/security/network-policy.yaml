apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: securebank-api-policy
  namespace: securebank
spec:
  podSelector:
    matchLabels:
      app: securebank-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: securebank-ui
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: securebank-db
    ports:
    - protocol: TCP
      port: 5432

