apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: securebank
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:vangetirajkumar-repo/securebank-eks.git'
    targetRevision: main
    path: manifests/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: securebank
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

