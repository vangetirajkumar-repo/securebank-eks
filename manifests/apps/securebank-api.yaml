apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-api
  namespace: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-api
  template:
    metadata:
      labels:
        app: securebank-api
    spec:
      containers:
      - name: api
        image: vangetirajkumar/securebank-api:latest
        ports:
        - containerPort: 8080

