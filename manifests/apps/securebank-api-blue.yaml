apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-api-blue
  namespace: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-api
      version: blue
  template:
    metadata:
      labels:
        app: securebank-api
        version: blue
    spec:
      containers:
      - name: api
        image: rajkumarvangeti/securebank-api:182343ba79907b7924c626c9d79c66df6188e87f
        ports:
        - containerPort: 8080

