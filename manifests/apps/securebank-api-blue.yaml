apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-api-blue
  namespace: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-api
      version: blue
  template:
    metadata:
      labels:
        app: securebank-api
        version: blue
    spec:
      containers:
      - name: api
        image: rajkumarvangeti/securebank-api:bf33c3999c17f7276812cc934b23ccca2d6ed031
        ports:
        - containerPort: 8080

