apiVersion: apps/v1
kind: Deployment
metadata:
  name: securebank-api-blue
  namespace: securebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securebank-api
      version: blue
  template:
    metadata:
      labels:
        app: securebank-api
        version: blue
    spec:
      containers:
      - name: api
        image: rajkumarvangeti/securebank-api:7fed611623e136836d71a2b8b4e91e9545bbfd8d
        ports:
        - containerPort: 8080

