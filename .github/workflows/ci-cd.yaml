name: SecureBank CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push API image
      run: |
        docker build -t rajkumarvangeti/securebank-api:${{ github.sha }} ./api
        docker push rajkumarvangeti/securebank-api:${{ github.sha }}

    - name: Update Kubernetes manifests
      run: |
        sed -i "s|image: vangetirajkumar/securebank-api:.*|image: vangetirajkumar/securebank-api:${{ github.sha }}|" manifests/apps/securebank-api-blue.yaml
        git add manifests/apps/securebank-api-blue.yaml
        git commit -m "Update API image to ${{ github.sha }}"

    - name: Configure GitHub credentials
      run: |
        git config --global user.email "ci@securebank.com"
        git config --global user.name "SecureBank CI"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

    - name: Push changes
      run: git push origin main

